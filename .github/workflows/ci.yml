name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Install linters
        run: brew install swiftlint swiftformat
      - name: SwiftFormat (lint mode)
        run: swiftformat --lint .
      - name: SwiftLint
        run: swiftlint --strict
  test:
    # macos-26 = Xcode 26 / Swift 6.2, matching local development; the
    # macos-15 toolchain (Swift 6.0) rejects Swift 6.2 isolation inference
    # the package relies on.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Package tests
        run: swift test --package-path EdgeDashKit
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen
      - name: Build app (unsigned)
        run: >
          xcodebuild -project EdgeDash.xcodeproj -scheme EdgeDash
          -configuration Debug -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO build
