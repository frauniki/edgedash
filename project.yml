name: EdgeDash
options:
  bundleIdPrefix: jp.sinoa.edgedash
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: KARATP3NF4
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
packages:
  EdgeDashKit:
    path: EdgeDashKit
targets:
  EdgeDash:
    type: application
    platform: macOS
    sources:
      - EdgeDash/Sources
    dependencies:
      - package: EdgeDashKit
        product: EdgeDashKit
    entitlements:
      path: EdgeDash/EdgeDash.entitlements
      properties:
        # Hardened runtime blocks outgoing Apple Events without this — the
        # Automation TCC prompt never even appears.
        com.apple.security.automation.apple-events: true
    info:
      path: EdgeDash/Info.plist
      properties:
        CFBundleDisplayName: EdgeDash
        LSUIElement: true
        LSMinimumSystemVersion: "15.0"
        NSInputMonitoringUsageDescription: EdgeDash reads the XENEON EDGE touch panel directly to provide on-screen touch controls without moving your cursor.
        NSAppleEventsUsageDescription: EdgeDash controls the Music app to show and operate the now-playing widget on your dashboard.
        # Modern SDKs check the WhenInUse key even on macOS; the legacy key
        # covers older readers. Both point at the same purpose string.
        NSLocationUsageDescription: EdgeDash shows local weather on your dashboard.
        NSLocationWhenInUseUsageDescription: EdgeDash shows local weather on your dashboard.
        NSHumanReadableCopyright: © 2026 frauniki
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.sinoa.edgedash.app
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
